services:
  - type: web
    name: finance-backend-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CLIENT_URL
        value: "*"
      - key: AUTH_COOKIE_NAME
        value: token
      - key: MONGO_SERVER_SELECTION_TIMEOUT_MS
        value: 10000
      - key: MONGO_MAX_POOL_SIZE
        value: 10
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
